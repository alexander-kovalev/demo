<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  .ss-scroll::-webkit-scrollbar { width: 14px; height: 14px; }
  .ss-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
  .ss-scroll::-webkit-scrollbar-thumb { background: #c7ccd1; border: 3px solid #f1f5f9; border-radius: 8px; }
  .ss-scroll::-webkit-scrollbar-thumb:hover { background: #aeb4ba; }
</style>
</helmet>

<div id="ss-root" ref="{{ setRoot }}" style="min-height:100vh;background:#f7f8fa;font-family:Inter,'Segoe UI',system-ui,-apple-system,sans-serif;color:#1f2937;padding:32px 24px;display:flex;flex-direction:column;align-items:center;gap:8px;">

  <div style="width:100%;max-width:300px;">
    <div style="font-size:13px;font-weight:600;color:#64748b;letter-spacing:.02em;text-transform:uppercase;margin-bottom:10px;">{{ fieldLabel }}</div>

    <!-- FIELD -->
    <div ref="{{ setField }}" style="position:relative;">
      <div style="display:flex;align-items:stretch;gap:8px;">
        <!-- input + toggle group (with left selected-info addon) -->
        <div style="flex:1;display:flex;align-items:stretch;border:1px solid {{ fieldBorder }};border-radius:6px;overflow:hidden;background:#fff;box-shadow:0 1px 2px rgba(15,23,42,.04);">
          <!-- left addon (selected-options info + clear) -->
          <sc-if value="{{ hasSelection }}" hint-placeholder-val="{{ false }}">
            <div style="display:flex;align-items:stretch;background:#f8fafc;border-right:1px solid #e2e8f0;">
              <button onClick="{{ toggleTip }}" aria-label="Show selected" title="Show selected items" style="display:flex;align-items:center;gap:7px;padding:0 11px 0 13px;background:transparent;border:none;font:inherit;font-size:13px;font-weight:500;color:#475569;letter-spacing:.01em;white-space:nowrap;cursor:pointer;transition:background .15s;" style-hover="background:#eef2f7;">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none" style="flex:none;"><rect x="1.5" y="1.5" width="13" height="13" rx="3" fill="{{ primary }}"/><path d="M4.5 8.2l2.2 2.2L11.5 5.6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span>{{ summaryText }}</span>
              </button>
              <button onClick="{{ clearAll }}" aria-label="Clear selection" title="Clear all selected" style="width:30px;border:none;cursor:pointer;background:transparent;color:#94a3b8;display:flex;align-items:center;justify-content:center;transition:color .15s;" style-hover="color:#475569;">
                <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              </button>
            </div>
          </sc-if>
          <div style="flex:1;display:flex;align-items:stretch;min-width:0;">
            <input
              type="text"
              value="{{ query }}"
              onInput="{{ onInput }}"
              onFocus="{{ onFocus }}"
              placeholder="{{ entityName }}"
              title="Type to search options"
              style="flex:1;min-width:0;border:none;outline:none;font:inherit;font-size:15px;color:#1f2937;padding:7px 12px;background:transparent;" />
            <button
              onClick="{{ toggleOpen }}"
              aria-label="Toggle options"
              title="Show options"
              style="width:42px;border:none;cursor:pointer;background:{{ primary }};display:flex;align-items:center;justify-content:center;transition:background .15s;"
              style-hover="filter:brightness(.94);">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style="transform:rotate({{ caretRotate }});transition:transform .2s;"><path d="M4 6l4 4 4-4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- selected-options tooltip (anchored under addon) -->
      <div style="position:relative;">
        <sc-if value="{{ tipOpen }}" hint-placeholder-val="{{ false }}">
          <div style="position:fixed;top:{{ panelTop }};left:{{ panelLeft }};z-index:9999;background:#1e293b;color:#e2e8f0;border-radius:8px;box-shadow:0 10px 28px -6px rgba(15,23,42,.45);padding:6px;min-width:240px;max-width:340px;">
            <div style="font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#94a3b8;padding:6px 10px 4px;">{{ countLabel }}</div>
            <div style="display:flex;align-items:center;gap:8px;padding:4px 10px 6px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:2px;">
              <span style="font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#64748b;flex:none;min-width:38px;">PSP #</span>
              <span style="font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#64748b;flex:1;">Product Description</span>
              <span style="flex:none;width:15px;"></span>
            </div>
            <div class="ss-scroll" style="max-height:220px;overflow:auto;">
              <sc-for list="{{ selectedItems }}" as="it" hint-placeholder-count="3">
                <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:5px;font-size:13px;" style-hover="background:rgba(255,255,255,.07);">
                  <span style="font-size:11px;font-weight:600;color:#94a3b8;flex:none;min-width:38px;">{{ it.psp }}</span>
                  <span style="flex:1;color:#f1f5f9;">{{ it.desc }}</span>
                  <button onClick="{{ it.remove }}" aria-label="Remove" title="Remove from selection" style="flex:none;border:none;background:transparent;color:#64748b;cursor:pointer;padding:2px;line-height:0;border-radius:4px;" style-hover="color:#f8fafc;background:rgba(255,255,255,.12);">
                    <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                  </button>
                </div>
              </sc-for>
            </div>
            <div style="position:absolute;top:-5px;left:5px;width:10px;height:10px;background:#1e293b;transform:rotate(45deg);"></div>
          </div>
        </sc-if>
      </div>

      <!-- PANEL -->
      <sc-if value="{{ open }}" hint-placeholder-val="{{ false }}">
      <div style="position:fixed;top:{{ panelTop }};left:{{ panelLeft }};width:max-content;min-width:{{ panelMinWidth }};max-width:{{ panelMaxWidth }};background:#fff;border:1px solid #e2e8f0;border-radius:8px;box-shadow:0 12px 32px -8px rgba(15,23,42,.22),0 2px 6px rgba(15,23,42,.08);z-index:9998;overflow:hidden;display:flex;flex-direction:column;max-height:70vh;">

        <!-- panel toolbar -->
        <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border-bottom:1px solid #eef1f4;background:#fafbfc;">
          <div onClick="{{ toggleAll }}" title="{{ selectAllLabel }}" style="display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none;">
            <div style="{{ headBoxStyle }}">
              <sc-if value="{{ allChecked }}" hint-placeholder-val="{{ false }}"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 8.5l3.2 3.2L13 5" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></sc-if>
              <sc-if value="{{ someChecked }}" hint-placeholder-val="{{ false }}"><div style="width:9px;height:2.5px;background:#fff;border-radius:2px;"></div></sc-if>
            </div>
            <span style="font-size:13px;font-weight:600;color:#334155;">{{ selectAllLabel }}</span>
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <sc-if value="{{ anyFilter }}" hint-placeholder-val="{{ false }}">
              <button onClick="{{ clearFilters }}" title="Clear all column filters" style="display:flex;align-items:center;gap:5px;font:inherit;font-size:12px;font-weight:600;color:#475569;background:#fff;border:1px solid #d8dee6;border-radius:5px;padding:4px 9px;cursor:pointer;transition:background .12s,border-color .12s;" style-hover="background:#f1f5f9;border-color:#cbd5e1;">
                <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                Clear filters
              </button>
            </sc-if>
            <span style="font-size:12.5px;color:#94a3b8;font-weight:500;">{{ countLabel }}</span>
          </div>
        </div>

        <!-- scroll region -->
        <div class="ss-scroll" style="flex:1;min-height:0;overflow:auto;">
          <div style="min-width:{{ tableMinWidth }};">

            <!-- TABLE HEADER + COLUMN FILTERS -->
            <sc-if value="{{ showColumns }}" hint-placeholder-val="{{ true }}">
              <div style="position:sticky;top:0;z-index:2;">
                <!-- sortable header row -->
                <div style="display:grid;grid-template-columns:{{ gridCols }};background:#f1f5f9;border-bottom:1px solid #e2e8f0;">
                  <div style="padding:11px 8px 11px 14px;"></div>
                  <sc-for list="{{ headerCols }}" as="col" hint-placeholder-count="6">
                    <div onClick="{{ col.sort }}" title="{{ col.sortTitle }}" style="{{ col.headStyle }}" style-hover="background:#e2e8f0;">
                      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ col.label }}</span>
                      <span style="{{ col.arrowStyle }}">{{ col.arrow }}</span>
                    </div>
                  </sc-for>
                </div>
                <!-- per-column filter row -->
                <div style="display:grid;grid-template-columns:{{ gridCols }};background:#fafbfc;border-bottom:1px solid #e2e8f0;">
                  <div style="padding:6px 8px;"></div>
                  <sc-for list="{{ headerCols }}" as="col" hint-placeholder-count="6">
                    <div style="padding:6px 8px;position:relative;display:flex;align-items:center;">
                      <input value="{{ col.filterValue }}" onInput="{{ col.onFilter }}" onClick="{{ stopProp }}" placeholder="Filter…" title="Filter this column" style="{{ col.filterInputStyle }}" style-focus="border-color:{{ primary }};" />
                      <sc-if value="{{ col.hasFilter }}" hint-placeholder-val="{{ false }}">
                        <button onClick="{{ col.clearFilter }}" aria-label="Clear filter" title="Clear filter" style="position:absolute;right:14px;width:16px;height:16px;border:none;background:#e2e8f0;border-radius:50%;color:#64748b;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;transition:background .12s,color .12s;" style-hover="background:#cbd5e1;color:#1f2937;">
                          <svg width="8" height="8" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
                        </button>
                      </sc-if>
                    </div>
                  </sc-for>
                </div>
              </div>
            </sc-if>

            <!-- ROWS -->
            <sc-for list="{{ rows }}" as="row" hint-placeholder-count="6">
              <div onClick="{{ row.toggle }}" title="{{ row.title }}" style="{{ row.rowStyle }}" style-hover="background:#f1f6fe;">
                <div style="padding:7px 8px 7px 14px;display:flex;align-items:center;">
                  <div style="{{ row.boxStyle }}">
                    <sc-if value="{{ row.checked }}" hint-placeholder-val="{{ false }}"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 8.5l3.2 3.2L13 5" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></sc-if>
                  </div>
                </div>
                <sc-if value="{{ showColumns }}" hint-placeholder-val="{{ true }}">
                  <div style="padding:7px 12px;font-size:13.5px;color:#475569;display:flex;align-items:center;">{{ row.psp }}</div>
                  <div style="padding:7px 12px;font-size:13.5px;color:#1f2937;font-weight:500;display:flex;align-items:center;">{{ row.desc }}</div>
                  <div style="padding:7px 12px;font-size:13.5px;color:#475569;display:flex;align-items:center;">{{ row.code }}</div>
                  <div style="padding:7px 12px;font-size:13.5px;color:#475569;display:flex;align-items:center;">{{ row.pack }}</div>
                  <div style="padding:7px 12px;font-size:13.5px;color:#94a3b8;display:flex;align-items:center;">{{ row.cat }}</div>
                  <div style="padding:7px 12px;font-size:13.5px;color:#475569;display:flex;align-items:center;">{{ row.brand }}</div>
                </sc-if>
                <sc-if value="{{ row.simple }}" hint-placeholder-val="{{ false }}">
                  <div style="padding:7px 12px;font-size:14px;color:#1f2937;display:flex;align-items:center;">{{ row.desc }}</div>
                </sc-if>
              </div>
            </sc-for>

            <sc-if value="{{ noResults }}" hint-placeholder-val="{{ false }}">
              <div style="padding:32px;text-align:center;color:#94a3b8;font-size:14px;">No results found</div>
            </sc-if>
          </div>
        </div>
      </div>
      </sc-if>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:900,&quot;height&quot;:560},&quot;primary&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2563eb&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#2563eb&quot;,&quot;#1d4ed8&quot;,&quot;#0ea5e9&quot;,&quot;#7c3aed&quot;,&quot;#0f766e&quot;,&quot;#dc2626&quot;]},&quot;showColumns&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;entityName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Products&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;fieldLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Product Catalog&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.data = [
      { id: 1, psp: 2689, desc: 'WINE COOKING SHERRY', code: 520460, pack: '4/1 GAL', cat: null, brand: 'REGINA' },
      { id: 2, psp: 2690, desc: 'WINE COOKING BURGUNDY', code: 520461, pack: '4/1 GAL', cat: null, brand: 'REGINA' },
      { id: 3, psp: 2692, desc: 'VINEGAR WINE RED', code: 520420, pack: '4/1 GAL', cat: null, brand: 'REGINA' },
      { id: 4, psp: 7715, desc: 'VINEGAR WHITE WINE', code: 520421, pack: '4/1 GAL', cat: null, brand: 'REGINA' },
      { id: 5, psp: 2638, desc: 'GYRO SLICES RAW IQF', code: 20065, pack: '1/10 LB', cat: null, brand: 'GRECIAN D' },
      { id: 6, psp: 2641, desc: 'GYRO CONE BEEF & LAMB', code: 20071, pack: '2/20 LB', cat: 'MEAT', brand: 'GRECIAN D' },
      { id: 7, psp: 3102, desc: 'OLIVE OIL EXTRA VIRGIN', code: 118840, pack: '4/1 GAL', cat: 'OIL', brand: 'COLAVITA' },
      { id: 8, psp: 3110, desc: 'OLIVE OIL POMACE BLEND', code: 118855, pack: '6/1 GAL', cat: 'OIL', brand: 'COLAVITA' },
      { id: 9, psp: 4051, desc: 'FETA CHEESE CRUMBLES', code: 60412, pack: '4/5 LB', cat: 'DAIRY', brand: 'PRESIDENT' },
      { id: 10, psp: 4072, desc: 'MOZZARELLA SHRED LMPS', code: 60498, pack: '4/5 LB', cat: 'DAIRY', brand: 'GALBANI' },
      { id: 11, psp: 5203, desc: 'TOMATO PASTE 6/10', code: 88102, pack: '6/#10', cat: 'CANNED', brand: 'STANISLAUS' },
      { id: 12, psp: 5219, desc: 'TOMATO CRUSHED GROUND', code: 88140, pack: '6/#10', cat: 'CANNED', brand: 'STANISLAUS' },
      { id: 13, psp: 6610, desc: 'PITA BREAD 7 INCH', code: 41020, pack: '12/6 CT', cat: 'BAKERY', brand: 'KONTOS' },
      { id: 14, psp: 6622, desc: 'PITA BREAD POCKETLESS', code: 41044, pack: '12/10 CT', cat: 'BAKERY', brand: 'KONTOS' },
      { id: 15, psp: 7001, desc: 'CHICKEN BREAST BNLS SKLS', code: 30210, pack: '1/40 LB', cat: 'POULTRY', brand: 'TYSON' },
      { id: 16, psp: 7044, desc: 'CHICKEN TENDERS BREADED', code: 30288, pack: '2/5 LB', cat: 'POULTRY', brand: 'TYSON' },
      { id: 17, psp: 8120, desc: 'RICE BASMATI LONG GRAIN', code: 71200, pack: '1/25 LB', cat: 'GRAIN', brand: 'ROYAL' },
      { id: 18, psp: 8134, desc: 'RICE JASMINE PREMIUM', code: 71244, pack: '1/25 LB', cat: 'GRAIN', brand: 'DYNASTY' },
      { id: 19, psp: 9201, desc: 'GARLIC MINCED IN OIL', code: 99340, pack: '2/5 LB', cat: 'PRODUCE', brand: 'SPICE WLD' },
      { id: 20, psp: 9255, desc: 'ONION POWDER GRANULATED', code: 99388, pack: '6/20 OZ', cat: 'SPICE', brand: 'SPICE WLD' },
      { id: 21, psp: 1042, desc: 'SUGAR GRANULATED FINE', code: 12010, pack: '1/50 LB', cat: 'BAKING', brand: 'DOMINO' },
      { id: 22, psp: 1058, desc: 'FLOUR ALL PURPOSE BLCHD', code: 12080, pack: '1/50 LB', cat: 'BAKING', brand: 'GOLD MDL' },
      { id: 23, psp: 1190, desc: 'SALT KOSHER COARSE', code: 12190, pack: '12/3 LB', cat: 'SPICE', brand: 'DIAMOND' },
      { id: 24, psp: 1224, desc: 'PEPPER BLACK GROUND', code: 12244, pack: '6/18 OZ', cat: 'SPICE', brand: 'MCCORMICK' },
      { id: 25, psp: 1330, desc: 'BUTTER SOLIDS UNSALTED', code: 60710, pack: '1/36 LB', cat: 'DAIRY', brand: 'LAND O LK' },
      { id: 26, psp: 1402, desc: 'EGGS WHOLE LIQUID', code: 60822, pack: '15/2 LB', cat: 'DAIRY', brand: 'PAPETTI' }
    ];
    this.columns = [
      { key: 'psp', label: 'PSP Internal Number', numeric: true },
      { key: 'desc', label: 'Product Description' },
      { key: 'code', label: 'Manufacturer Product Code', numeric: true },
      { key: 'pack', label: 'Pack Size' },
      { key: 'cat', label: 'Category' },
      { key: 'brand', label: 'Brand' }
    ];
    this.state = { open: false, tipOpen: false, query: '', selected: new Set([1, 2, 3, 5, 7, 9]), sortKey: null, sortDir: 'asc', colFilters: {} };
    this._onDocDown = this._onDocDown.bind(this);
    this._onResize = this._onResize.bind(this);
  }

  componentDidMount() { document.addEventListener('mousedown', this._onDocDown); window.addEventListener('resize', this._onResize); window.addEventListener('scroll', this._onResize, true); }
  componentWillUnmount() { document.removeEventListener('mousedown', this._onDocDown); window.removeEventListener('resize', this._onResize); window.removeEventListener('scroll', this._onResize, true); }
  _onResize() { if (this.state.open || this.state.tipOpen) this.forceUpdate(); }
  _onDocDown(e) { if (this.field && !this.field.contains(e.target)) this.setState({ open: false, tipOpen: false }); }

  toggle(id) {
    this.setState(s => {
      const sel = new Set(s.selected);
      sel.has(id) ? sel.delete(id) : sel.add(id);
      return { selected: sel };
    });
  }

  highlight(text) {
    const q = this.state.query.trim();
    const str = text == null ? '' : String(text);
    if (!q) return str;
    const ql = q.toLowerCase();
    const lower = str.toLowerCase();
    if (!lower.includes(ql)) return str;
    const parts = [];
    let i = 0, idx, key = 0;
    while ((idx = lower.indexOf(ql, i)) !== -1) {
      if (idx > i) parts.push(str.slice(i, idx));
      parts.push(React.createElement('mark', { key: key++, style: { background: '#fde68a', color: 'inherit', borderRadius: '2px', padding: '0 1px' } }, str.slice(idx, idx + q.length)));
      i = idx + q.length;
    }
    if (i < str.length) parts.push(str.slice(i));
    return React.createElement(React.Fragment, null, ...parts);
  }

  setColFilter(key, val) {
    this.setState(s => ({ colFilters: { ...s.colFilters, [key]: val } }));
  }

  sortBy(key) {
    this.setState(s => {
      if (s.sortKey !== key) return { sortKey: key, sortDir: 'asc' };
      if (s.sortDir === 'asc') return { sortDir: 'desc' };
      return { sortKey: null, sortDir: 'asc' };
    });
  }

  filtered() {
    const q = this.state.query.trim().toLowerCase();
    const cf = this.state.colFilters;
    const keys = ['psp', 'desc', 'code', 'pack', 'cat', 'brand'];
    let arr = this.data.filter(o => {
      if (q && !keys.some(k => String(o[k] ?? '').toLowerCase().includes(q))) return false;
      for (const k of keys) {
        const fv = (cf[k] || '').trim().toLowerCase();
        if (fv && !String(o[k] ?? '').toLowerCase().includes(fv)) return false;
      }
      return true;
    });
    const { sortKey, sortDir } = this.state;
    if (sortKey) {
      const col = this.columns.find(c => c.key === sortKey);
      const dir = sortDir === 'desc' ? -1 : 1;
      arr = [...arr].sort((a, b) => {
        let av = a[sortKey], bv = b[sortKey];
        if (av == null) av = col && col.numeric ? Infinity : '';
        if (bv == null) bv = col && col.numeric ? Infinity : '';
        if (col && col.numeric) return (av - bv) * dir;
        return String(av).localeCompare(String(bv)) * dir;
      });
    }
    return arr;
  }

  renderVals() {
    const primary = this.props.primary || '#2563eb';
    const showColumns = this.props.showColumns ?? true;
    const entityName = this.props.entityName || 'Products';
    const { open, query, selected, tipOpen } = this.state;
    const list = this.filtered();

    const box = (checked, partial) =>
      `width:20px;height:20px;border-radius:5px;flex:none;display:flex;align-items:center;justify-content:center;transition:all .12s;` +
      (checked || partial
        ? `background:${primary};border:1px solid ${primary};`
        : `background:#fff;border:1.5px solid #cbd5e1;`);

    const rows = list.map(o => {
      const checked = selected.has(o.id);
      const catText = o.cat === null ? 'null' : o.cat;
      return {
        ...o,
        psp: this.highlight(o.psp),
        desc: this.highlight(o.desc),
        code: this.highlight(o.code),
        pack: this.highlight(o.pack),
        cat: this.highlight(catText),
        brand: this.highlight(o.brand),
        checked,
        simple: !showColumns,
        title: checked ? 'Click to deselect' : 'Click to select',
        toggle: () => this.toggle(o.id),
        boxStyle: box(checked, false),
        rowStyle: `display:grid;grid-template-columns:${showColumns ? '44px 160px 230px 200px 110px 120px 130px' : '44px 1fr'};cursor:pointer;border-bottom:1px solid #f1f5f9;transition:background .1s;background:${checked ? '#eff6fe' : '#fff'};`
      };
    });

    const count = selected.size;
    const allChecked = list.length > 0 && list.every(o => selected.has(o.id));
    const someChecked = !allChecked && list.some(o => selected.has(o.id));

    let summaryText = '';
    if (count === 1) {
      const only = this.data.find(o => selected.has(o.id));
      summaryText = only ? only.desc : '';
    } else if (count > 1) {
      summaryText = `${count} ${entityName}`;
    }

    return {
      primary,
      showColumns,
      entityName,
      fieldLabel: this.props.fieldLabel || 'Product Catalog',
      fieldBorder: open ? primary : '#cbd5e1',
      query,
      open,
      caretRotate: open ? '180deg' : '0deg',
      hasSelection: count > 0,
      summaryText,
      tipOpen: tipOpen && count > 0,
      toggleTip: (e) => { e.stopPropagation(); this.setState(s => ({ tipOpen: !s.tipOpen })); },
      selectedItems: this.data.filter(o => selected.has(o.id)).map(o => ({
        psp: o.psp, desc: o.desc, remove: (e) => { e.stopPropagation(); this.toggle(o.id); }
      })),
      rows,
      noResults: list.length === 0,
      allChecked,
      someChecked,
      headBoxStyle: box(allChecked, someChecked),
      selectAllLabel: allChecked ? 'Deselect all' : 'Select all',
      countLabel: `${count} selected`,
      tableMinWidth: showColumns ? '1094px' : '100%',
      gridCols: '44px 160px 230px 200px 110px 120px 130px',
      stopProp: (e) => e.stopPropagation(),
      anyFilter: Object.values(this.state.colFilters).some(v => (v || '').trim() !== ''),
      clearFilters: (e) => { e.stopPropagation(); this.setState({ colFilters: {} }); },
      headerCols: this.columns.map(c => {
        const active = this.state.sortKey === c.key;
        const dir = this.state.sortDir;
        const fv = this.state.colFilters[c.key] || '';
        return {
          label: c.label,
          arrow: active ? (dir === 'asc' ? '↑' : '↓') : '↕',
          arrowStyle: `font-size:11px;flex:none;color:${active ? primary : '#cbd5e1'};`,
          headStyle: `padding:8px 12px;font-size:12px;font-weight:700;color:${active ? primary : '#475569'};letter-spacing:.01em;cursor:pointer;display:flex;align-items:center;gap:5px;user-select:none;transition:background .12s,color .12s;`,
          sortTitle: active ? (dir === 'asc' ? 'Sorted ascending — click for descending' : 'Sorted descending — click to clear') : 'Click to sort',
          sort: () => this.sortBy(c.key),
          filterValue: fv,
          hasFilter: fv.length > 0,
          filterInputStyle: `width:100%;border:1px solid #e2e8f0;border-radius:5px;font:inherit;font-size:12px;color:#1f2937;padding:5px ${fv ? '24px' : '8px'} 5px 8px;background:#fff;outline:none;transition:border-color .12s;`,
          onFilter: (e) => this.setColFilter(c.key, e.target.value),
          clearFilter: (e) => { e.stopPropagation(); this.setColFilter(c.key, ''); }
        };
      }),
      onFocus: () => this.setState({ open: true, tipOpen: false }),
      toggleOpen: (e) => { e.preventDefault(); this.setState(s => ({ open: !s.open, tipOpen: false })); },
      onInput: (e) => this.setState({ query: e.target.value, open: true, tipOpen: false }),
      clearAll: (e) => { e.stopPropagation(); this.setState({ selected: new Set(), query: '' }); },
      setRoot: (el) => { this.root = el; },
      setField: (el) => { this.field = el; },
      panelTop: (() => { const r = this.field && this.field.getBoundingClientRect(); return r ? Math.round(r.bottom + 4) + 'px' : '0'; })(),
      panelLeft: (() => { const r = this.field && this.field.getBoundingClientRect(); return r ? Math.round(r.left) + 'px' : '0'; })(),
      panelMinWidth: (() => { const r = this.field && this.field.getBoundingClientRect(); return r ? Math.round(r.width) + 'px' : '300px'; })(),
      panelMaxWidth: (() => {
        if (this.field) {
          const r = this.field.getBoundingClientRect();
          return Math.max(280, Math.round(window.innerWidth - r.left - 12)) + 'px';
        }
        return '70vw';
      })(),
      toggleAll: () => {
        this.setState(s => {
          const sel = new Set(s.selected);
          const cur = this.filtered();
          const all = cur.length > 0 && cur.every(o => sel.has(o.id));
          cur.forEach(o => all ? sel.delete(o.id) : sel.add(o.id));
          return { selected: sel };
        });
      }
    };
  }
}
</script>
</body>
</html>
